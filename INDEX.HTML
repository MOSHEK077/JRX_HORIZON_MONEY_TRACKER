<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JRX · Horizon Finance Tracker | Live + Quotes</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --primary: #3b3bff;
            --primary-glow: #5f5fff;
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --bg: #f0f4fa;
            --card: rgba(255, 255, 255, 0.92);
            --card-solid: #ffffff;
            --text: #0a0c12;
            --text-muted: #4b5563;
            --border: rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
        }

        .dark {
            --primary: #818cff;
            --bg: #0b1120;
            --card: rgba(18, 25, 45, 0.9);
            --card-solid: #1e293b;
            --text: #f1f5f9;
            --text-muted: #cbd5e6;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.25s ease;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        /* Header area with brand, time, theme */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .brand-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .jrx-badge {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .jrx-badge i {
            background: none;
            color: var(--primary);
            margin-right: 6px;
        }
        .tagline {
            background: var(--card-solid);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--primary);
        }
        .live-info {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            background: var(--card);
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 60px;
            border: 1px solid var(--border);
        }
        .clock-date {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-btn {
            background: var(--card-solid);
            border: none;
            padding: 8px 16px;
            border-radius: 44px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
            transition: 0.2s;
        }
        /* welcome & quotes row */
        .welcome-quote {
            background: linear-gradient(135deg, var(--card-solid), var(--card));
            border-radius: 28px;
            padding: 16px 24px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            backdrop-filter: blur(4px);
        }
        .user-greeting {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .user-greeting i {
            font-size: 1.6rem;
            color: var(--primary);
        }
        .edit-name {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: underline;
        }
        .quote-box {
            text-align: right;
            max-width: 500px;
        }
        .quote-text {
            font-style: italic;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--primary);
        }
        .quote-author {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 22px 18px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-number {
            font-size: 2.6rem;
            font-weight: 800;
        }
        .balance .stat-number { color: var(--primary); }
        .income .stat-number { color: var(--success); }
        .expense .stat-number { color: var(--danger); }

        .form-panel {
            background: var(--card-solid);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            gap: 14px;
            align-items: end;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .category-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .add-cat-btn {
            background: var(--primary);
            border: none;
            border-radius: 40px;
            width: 42px;
            height: 42px;
            color: white;
            cursor: pointer;
        }
        input, select {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 28px;
            color: var(--text);
        }
        .action-btn {
            border: none;
            border-radius: 44px;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .add-btn { background: linear-gradient(105deg, var(--success), #059669); color: white; }
        .update-btn { background: linear-gradient(105deg, var(--warning), #d97706); color: white; }
        .cancel-btn { background: var(--card-solid); border: 1px solid var(--border); color: var(--text); }
        .form-actions { display: flex; gap: 12px; margin-top: 0; }

        .search-wrapper input {
            width: 100%;
            background: var(--card-solid);
            border-radius: 60px;
            padding: 14px 20px 14px 48px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>');
            background-repeat: no-repeat;
            background-position: 18px center;
            background-size: 20px;
        }

        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tx-item {
            background: var(--card);
            border-radius: 24px;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }
        .tx-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .tx-title {
            font-weight: 700;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .category-badge {
            background: var(--card-solid);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: var(--primary);
        }
        .tx-amount { font-weight: 800; font-size: 1.2rem; }
        .income-tag { color: var(--success); }
        .expense-tag { color: var(--danger); }
        .tx-actions { display: flex; gap: 10px; }
        .edit-btn, .delete-btn {
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
        }
        .edit-btn { background: rgba(59,59,255,0.1); color: var(--primary); }
        .delete-btn { background: rgba(244,63,94,0.1); color: var(--danger); }
        .insight-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 40px;
        }
        .chart-card {
            background: var(--card-solid);
            border-radius: 32px;
            padding: 18px;
        }
        canvas { max-height: 220px; width: 100%; }

        @media (max-width: 780px) {
            .input-row { grid-template-columns: 1fr; }
            .tx-item { flex-direction: column; align-items: flex-start; gap: 12px; }
            .welcome-quote { flex-direction: column; align-items: flex-start; text-align: left; }
            .quote-box { text-align: left; width: 100%; }
            .top-bar { flex-direction: column; align-items: stretch; }
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            animation: fadeOut 2.5s forwards;
            z-index: 1000;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .empty-message { text-align: center; padding: 40px; opacity: 0.6; }
    </style>
</head>
<body>
<div class="container">
    <!-- Top bar: brand + live clock + theme -->
    <div class="top-bar">
        <div class="brand-header">
            <div class="jrx-badge">
                <i class="fas fa-chart-line"></i> JRX<span style="font-weight:400"> | horizon</span>
            </div>
            <div class="tagline">
                <i class="fas fa-bolt"></i> CRUD + live insights
            </div>
        </div>
        <div class="live-info">
            <div class="clock-date" id="liveDateTime">
                <i class="far fa-calendar-alt"></i> <span id="dateStr">--</span> &nbsp; <i class="far fa-clock"></i> <span id="timeStr">--:--:--</span>
            </div>
            <button class="theme-btn" id="themeToggleBtn"><i class="fas fa-moon"></i> Theme</button>
        </div>
    </div>

    <!-- Welcome + rotating positive quotes -->
    <div class="welcome-quote">
        <div class="user-greeting">
            <i class="fas fa-smile-wink"></i>
            <span id="greetingText">Welcome, Explorer!</span>
            <button class="edit-name" id="editNameBtn"><i class="fas fa-pen"></i> edit</button>
        </div>
        <div class="quote-box">
            <div class="quote-text" id="quoteText">"Your financial journey starts with one step."</div>
            <div class="quote-author" id="quoteAuthor">— JRX</div>
        </div>
    </div>

    <!-- Stats -->
    <div class="analytics-grid">
        <div class="stat-card balance"><h3><i class="fas fa-coins"></i> NET BALANCE</h3><div class="stat-number" id="balance">₹0</div></div>
        <div class="stat-card income"><h3><i class="fas fa-arrow-up"></i> TOTAL INCOME</h3><div class="stat-number" id="income">₹0</div></div>
        <div class="stat-card expense"><h3><i class="fas fa-arrow-down"></i> TOTAL EXPENSE</h3><div class="stat-number" id="expense">₹0</div></div>
    </div>

    <!-- CRUD Form -->
    <div class="form-panel">
        <div class="input-row">
            <div class="input-field"><label><i class="fas fa-pen"></i> DESCRIPTION</label><input type="text" id="title" placeholder="e.g., Salary, Groceries"></div>
            <div class="input-field"><label><i class="fas fa-rupee-sign"></i> AMOUNT</label><input type="number" id="amount" placeholder="Amount"></div>
            <div class="input-field"><label><i class="fas fa-tag"></i> TYPE</label><select id="type"><option value="income">Income 💰</option><option value="expense">Expense 🔻</option></select></div>
            <div class="input-field"><label><i class="fas fa-layer-group"></i> CATEGORY</label><div class="category-wrapper"><select id="category"></select><button class="add-cat-btn" id="addCategoryBtn"><i class="fas fa-plus"></i></button></div></div>
            <div class="form-actions"><button class="action-btn add-btn" id="addTransactionBtn"><i class="fas fa-plus-circle"></i> ADD</button><button class="action-btn update-btn" id="updateTransactionBtn" style="display:none;"><i class="fas fa-save"></i> UPDATE</button><button class="action-btn cancel-btn" id="cancelEditBtn" style="display:none;"><i class="fas fa-times"></i> CANCEL</button></div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-wrapper"><input type="text" id="search" placeholder="🔍 Search by description or category..."></div>

    <div class="transactions-title"><span><i class="fas fa-history"></i> Transactions (CRUD)</span><span>✏️ Edit · 🗑️ Delete</span></div>
    <div id="transactionList" class="tx-list"></div>

    <!-- Charts -->
    <div class="insight-section">
        <div class="chart-card"><h4><i class="fas fa-chart-pie"></i> Expense by category</h4><canvas id="expenseChartCanvas"></canvas></div>
        <div class="chart-card"><h4><i class="fas fa-chart-simple"></i> Income vs Expense</h4><canvas id="flowChartCanvas"></canvas></div>
    </div>
</div>

<script>
    // ======================= DATA & STORAGE =======================
    let transactions = [];
    let expenseChart = null, flowChart = null;
    let editingId = null;
    const STORAGE_TRANSACTIONS = "jrxMoneyTracker";
    const STORAGE_CUSTOM_CATS = "jrxCustomCategories";
    const STORAGE_USER_NAME = "jrxUserName";

    const DEFAULT_INCOME_CATS = ["Salary", "Freelance", "Investments", "Gift", "Refund", "Other Income"];
    const DEFAULT_EXPENSE_CATS = ["Food & Dining", "Transport", "Shopping", "Entertainment", "Bills & Utilities", "Healthcare", "Education", "Other Expense"];
    let customCategories = { income: [], expense: [] };

    // Positive quotes array (rotating)
    const quotes = [
        { text: "Small daily savings become big wealth over time.", author: "JRX Wisdom" },
        { text: "Track every rupee, master your future.", author: "Finance Proverb" },
        { text: "A budget is telling your money where to go instead of wondering where it went.", author: "Dave Ramsey" },
        { text: "Don't save what is left after spending; spend what is left after saving.", author: "Warren Buffett" },
        { text: "Wealth is the ability to fully experience life.", author: "Henry David Thoreau" },
        { text: "Every financial decision you make shapes your freedom.", author: "JRX Insight" },
        { text: "Your net worth is not your self worth, but tracking it helps!", author: "Anonymous" },
        { text: "Make your money work for you, not the other way.", author: "Robert Kiyosaki" }
    ];
    let quoteIndex = 0;

    // ======================= Helper functions =======================
    function showToast(msg) {
        const existing = document.querySelector('.toast-msg');
        if(existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2600);
    }

    function loadCustomCategories() {
        const stored = localStorage.getItem(STORAGE_CUSTOM_CATS);
        if(stored) {
            try { const p = JSON.parse(stored); customCategories.income = p.income || []; customCategories.expense = p.expense || []; } catch(e) {}
        }
    }
    function saveCustomCategories() { localStorage.setItem(STORAGE_CUSTOM_CATS, JSON.stringify(customCategories)); }
    function getCategoryListForType(type) {
        const defaults = type === 'income' ? DEFAULT_INCOME_CATS : DEFAULT_EXPENSE_CATS;
        const custom = type === 'income' ? customCategories.income : customCategories.expense;
        const combined = [...defaults];
        custom.forEach(c => { if(!combined.includes(c)) combined.push(c); });
        return combined;
    }
    function updateCategoryDropdown(selectedValue = null) {
        const typeSelect = document.getElementById('type');
        const categorySelect = document.getElementById('category');
        const options = getCategoryListForType(typeSelect.value);
        categorySelect.innerHTML = '';
        options.forEach(cat => { const opt = document.createElement('option'); opt.value = cat; opt.textContent = cat; categorySelect.appendChild(opt); });
        if(selectedValue && options.includes(selectedValue)) categorySelect.value = selectedValue;
        else if(options.length) categorySelect.value = options[0];
    }
    function addNewCategory() {
        const type = document.getElementById('type').value;
        const newCat = prompt(`✨ New ${type === 'income' ? 'Income' : 'Expense'} category:`);
        if(!newCat || !newCat.trim()) return;
        const trimmed = newCat.trim();
        if(getCategoryListForType(type).includes(trimmed)) { showToast(`⚠️ "${trimmed}" already exists`); return; }
        if(type === 'income') customCategories.income.push(trimmed);
        else customCategories.expense.push(trimmed);
        saveCustomCategories();
        updateCategoryDropdown(trimmed);
        showToast(`✅ Category "${trimmed}" added`);
    }
    function loadData() {
        const stored = localStorage.getItem(STORAGE_TRANSACTIONS);
        if(stored) { transactions = JSON.parse(stored); transactions.forEach(t => { if(!t.category) t.category = t.type === 'income' ? "Salary" : "Food & Dining"; }); }
        else transactions = [];
    }
    function saveData() { localStorage.setItem(STORAGE_TRANSACTIONS, JSON.stringify(transactions)); }
    function computeTotals() {
        let totalIncome = 0, totalExpense = 0;
        transactions.forEach(t => { if(t.type === 'income') totalIncome += t.amount; else totalExpense += t.amount; });
        return { totalIncome, totalExpense, balance: totalIncome - totalExpense };
    }
    function resetFormAndExitEdit() {
        editingId = null;
        document.getElementById('title').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('type').value = 'income';
        updateCategoryDropdown();
        document.getElementById('addTransactionBtn').style.display = 'flex';
        document.getElementById('updateTransactionBtn').style.display = 'none';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }
    // CRUD: Create
    function addTransaction() {
        const title = document.getElementById('title').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        const category = document.getElementById('category').value;
        if(!title || isNaN(amount) || amount <= 0) { alert("Valid description & amount >0 required"); return; }
        const newTx = { id: Date.now(), title, amount, type, date: new Date().toLocaleString(), category };
        transactions.unshift(newTx);
        saveData();
        resetFormAndExitEdit();
        renderFullUI();
        showToast(`✅ ${type==='income'?'Income':'Expense'} added: ₹${amount}`);
    }
    function startEdit(id) {
        const tx = transactions.find(t => t.id === id);
        if(!tx) return;
        editingId = id;
        document.getElementById('title').value = tx.title;
        document.getElementById('amount').value = tx.amount;
        document.getElementById('type').value = tx.type;
        updateCategoryDropdown(tx.category);
        document.getElementById('addTransactionBtn').style.display = 'none';
        document.getElementById('updateTransactionBtn').style.display = 'flex';
        document.getElementById('cancelEditBtn').style.display = 'flex';
    }
    function updateTransaction() {
        if(!editingId) return;
        const title = document.getElementById('title').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        const category = document.getElementById('category').value;
        if(!title || isNaN(amount) || amount <= 0) { alert("Valid data required"); return; }
        const index = transactions.findIndex(t => t.id === editingId);
        if(index !== -1) {
            transactions[index] = { ...transactions[index], title, amount, type, category, date: new Date().toLocaleString() };
            saveData();
            resetFormAndExitEdit();
            renderFullUI();
            showToast(`✏️ Transaction updated`);
        } else resetFormAndExitEdit();
    }
    function cancelEdit() { resetFormAndExitEdit(); showToast("Edit cancelled"); }
    function deleteTransaction(id) {
        if(confirm("Permanently delete this transaction?")) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            if(editingId === id) resetFormAndExitEdit();
            renderFullUI();
            showToast(`🗑️ Deleted`);
        }
    }
    function renderTransactionList() {
        const container = document.getElementById('transactionList');
        const search = document.getElementById('search').value.toLowerCase();
        let filtered = [...transactions];
        if(search) filtered = filtered.filter(t => t.title.toLowerCase().includes(search) || t.category.toLowerCase().includes(search));
        filtered.sort((a,b)=>b.id - a.id);
        if(filtered.length === 0) { container.innerHTML = `<div class="empty-message"><i class="fas fa-search"></i> No transactions found</div>`; return; }
        container.innerHTML = '';
        filtered.forEach(t => {
            const div = document.createElement('div'); div.className = 'tx-item';
            const sign = t.type === 'income' ? '+' : '-';
            const amountClass = t.type === 'income' ? 'income-tag' : 'expense-tag';
            div.innerHTML = `
                <div class="tx-left">
                    <div class="tx-title"><span>${escapeHtml(t.title)}</span><span class="category-badge"><i class="fas fa-folder-open"></i> ${escapeHtml(t.category)}</span></div>
                    <div class="tx-meta"><span><i class="far fa-calendar-alt"></i> ${t.date}</span><span><i class="fas fa-tag"></i> ${t.type.toUpperCase()}</span></div>
                </div>
                <div class="tx-actions">
                    <div class="tx-amount ${amountClass}">${sign} ₹${t.amount.toFixed(2)}</div>
                    <button class="edit-btn" data-id="${t.id}"><i class="fas fa-edit"></i> Edit</button>
                    <button class="delete-btn" data-id="${t.id}"><i class="fas fa-trash-alt"></i> Del</button>
                </div>
            `;
            container.appendChild(div);
            div.querySelector('.edit-btn').addEventListener('click', () => startEdit(t.id));
            div.querySelector('.delete-btn').addEventListener('click', () => deleteTransaction(t.id));
        });
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function updateCharts() {
        const expenseMap = new Map();
        transactions.forEach(t => { if(t.type === 'expense') expenseMap.set(t.category, (expenseMap.get(t.category)||0) + t.amount); });
        const labels = Array.from(expenseMap.keys()), data = Array.from(expenseMap.values());
        const { totalIncome, totalExpense } = computeTotals();
        const isDark = document.body.classList.contains('dark');
        const textColor = isDark ? '#f1f5f9' : '#0f172a';
        if(expenseChart) expenseChart.destroy();
        if(flowChart) flowChart.destroy();
        const ctxExp = document.getElementById('expenseChartCanvas').getContext('2d');
        const ctxFlow = document.getElementById('flowChartCanvas').getContext('2d');
        if(labels.length) {
            expenseChart = new Chart(ctxExp, { type: 'pie', data: { labels, datasets: [{ data, backgroundColor: ['#3b82f6','#f97316','#10b981','#f43f5e','#8b5cf6','#facc15','#06b6d4','#ec489a'], borderWidth: 0 }] }, options: { plugins: { legend: { position: 'bottom', labels: { color: textColor } } } } });
        } else { expenseChart = new Chart(ctxExp, { type: 'pie', data: { labels: ['No Expenses'], datasets: [{ data: [1], backgroundColor: ['#94a3b8'] }] }, options: { plugins: { legend: { labels: { color: textColor } } } } }); }
        if(totalIncome ===0 && totalExpense===0) { flowChart = new Chart(ctxFlow, { type: 'doughnut', data: { labels: ['No Data'], datasets: [{ data: [1], backgroundColor: ['#cbd5e1'] }] }, options: { plugins: { legend: { labels: { color: textColor } } } } }); }
        else { flowChart = new Chart(ctxFlow, { type: 'doughnut', data: { labels: ['Total Income', 'Total Expense'], datasets: [{ data: [totalIncome, totalExpense], backgroundColor: ['#10b981','#f43f5e'], borderWidth: 0 }] }, options: { plugins: { legend: { position: 'bottom', labels: { color: textColor } } } } }); }
    }
    function renderFullUI() {
        const { totalIncome, totalExpense, balance } = computeTotals();
        document.getElementById('income').innerHTML = `₹${totalIncome.toFixed(2)}`;
        document.getElementById('expense').innerHTML = `₹${totalExpense.toFixed(2)}`;
        document.getElementById('balance').innerHTML = `₹${balance.toFixed(2)}`;
        renderTransactionList();
        updateCharts();
    }
    // ======================= USER NAME (DEFAULT: Moshek Shaju Jones J) =======================
    function updateUserNameDisplay() {
        let name = localStorage.getItem(STORAGE_USER_NAME);
        if(!name) {
            // Set default name without any prompt
            name = "Moshek Shaju Jones J";
            localStorage.setItem(STORAGE_USER_NAME, name);
        }
        document.getElementById('greetingText').innerHTML = `<i class="fas fa-user-astronaut"></i> Hello, ${escapeHtml(name)}!`;
    }
    function editName() {
        let newName = prompt("Enter your new name:", localStorage.getItem(STORAGE_USER_NAME) || "Moshek Shaju Jones J");
        if(newName && newName.trim() !== "") {
            localStorage.setItem(STORAGE_USER_NAME, newName.trim());
            updateUserNameDisplay();
            showToast(`👋 Name updated to ${newName.trim()}`);
        }
    }
    function rotateQuote() {
        quoteIndex = (quoteIndex + 1) % quotes.length;
        const q = quotes[quoteIndex];
        document.getElementById('quoteText').innerHTML = `“${q.text}”`;
        document.getElementById('quoteAuthor').innerHTML = `— ${q.author}`;
    }
    // ======================= LIVE CLOCK & DATE =======================
    function updateLiveDateTime() {
        const now = new Date();
        const optionsDate = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        const dateStr = now.toLocaleDateString(undefined, optionsDate);
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('dateStr').innerText = dateStr;
        document.getElementById('timeStr').innerText = timeStr;
    }
    // ======================= THEME =======================
    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('jrxTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
        updateCharts();
        renderTransactionList();
    }
    // ======================= INIT =======================
    function init() {
        loadCustomCategories();
        loadData();
        updateCategoryDropdown();
        updateUserNameDisplay();   // sets default name without prompt
        updateLiveDateTime();
        setInterval(updateLiveDateTime, 1000);
        setInterval(rotateQuote, 12000);
        rotateQuote(); // set first quote immediately
        
        document.getElementById('type').addEventListener('change', () => { if(!editingId) updateCategoryDropdown(); else updateCategoryDropdown(document.getElementById('category').value); });
        document.getElementById('addTransactionBtn').addEventListener('click', addTransaction);
        document.getElementById('updateTransactionBtn').addEventListener('click', updateTransaction);
        document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);
        document.getElementById('search').addEventListener('input', () => renderTransactionList());
        document.getElementById('addCategoryBtn').addEventListener('click', addNewCategory);
        document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
        document.getElementById('editNameBtn').addEventListener('click', editName);
        
        const savedTheme = localStorage.getItem('jrxTheme');
        if(savedTheme === 'dark') document.body.classList.add('dark');
        else if(savedTheme === 'light') document.body.classList.remove('dark');
        else if(window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.add('dark');
        renderFullUI();
    }
    init();
</script>
</body>
</html>
